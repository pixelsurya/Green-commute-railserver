services:
  - type: web
    name: greencommute-rail
    env: docker
    plan: free
    # Render builds your Dockerfile automatically
    dockerfilePath: ./Dockerfile
    # The port your app listens on (must match config.yml)
    port: 8989
    # Render free tier: spins down after 15min inactivity
    # First request after idle will be slow (cold start)
    healthCheckPath: /health
